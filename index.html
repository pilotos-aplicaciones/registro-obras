<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Obras — RVC Constructora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --text: #1A1714;
  --text2: #6B6560;
  --text3: #A09A93;
  --accent: #CC2929;
  --accent-l: #F9DADA;
  --red: #A93226;
  --red-l: #F5C6C2;
  --amber: #935E0A;
  --amber-l: #F5DFB8;
  --green: #1E4D32;
  --green-l: #C2DFD0;
  --blue: #1A3A6B;
  --blue-l: #D6E4F5;
  --r: 8px;
  --r-lg: 10px;
  --r-sm: 6px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:var(--font);font-size:14px;}
button{cursor:pointer;}
a{color:inherit;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
.hidden{display:none !important;}

/* ══ LOGIN ══ */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px 36px;width:360px;text-align:center;box-shadow:0 2px 18px rgba(0,0,0,0.06);}
.login-card img{height:44px;margin-bottom:22px;}
.login-card h1{font-size:17px;font-weight:600;margin:0 0 6px;}
.login-card p{font-size:13px;color:var(--text2);margin:0 0 26px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;border:1px solid var(--border);border-radius:var(--r);background:#fff;font-weight:500;transition:background .15s;}
.btn-google:hover{background:var(--surface2);}
#login-error{color:var(--accent);font-size:12.5px;margin-top:14px;min-height:16px;}

/* ══ APP SHELL ══ */
#app-wrap{height:100vh;display:flex;flex-direction:column;}
#app-body{display:flex;flex:1;overflow:hidden;min-height:0;position:relative;}
#main-content{flex:1;overflow-y:auto;padding:20px 24px;}

/* ══ NAVBAR ══ */
.navbar{background:var(--accent);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;position:relative;z-index:200;flex-shrink:0;}
.nav-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nav-logo-img{height:32px;width:auto;display:block;flex-shrink:0;object-fit:contain;}
.nav-app-info{display:flex;flex-direction:column;justify-content:center;line-height:1.2;}
.nav-app-name{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;}
.nav-app-meta{display:flex;align-items:center;gap:5px;margin-top:1px;}
.nav-app-sub{color:rgba(255,255,255,.55);font-size:10px;font-family:var(--mono);white-space:nowrap;}
.nav-meta-sep{color:rgba(255,255,255,.3);font-size:10px;font-family:var(--mono);}
.nav-version{color:rgba(255,255,255,.45);font-size:10px;font-family:var(--mono);white-space:nowrap;}
.nav-spacer{flex:1;}
.nbtn{height:32px;padding:0 12px;border:none;border-radius:var(--r-sm);font-size:12px;font-family:var(--font);font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:background .15s;}
.nbtn-secondary{background:rgba(255,255,255,.15);color:#fff;}
.nbtn-secondary:hover{background:rgba(255,255,255,.25);}
.nbtn-primary{background:#fff;color:var(--accent);font-weight:600;}
.nbtn-primary:hover{background:#f0f0f0;}
.nbtn-menu{background:rgba(255,255,255,.15);color:#fff;padding:0 10px;font-size:16px;line-height:1;}
.nbtn-menu:hover{background:rgba(255,255,255,.25);}
.nav-sync{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:6px;background:rgba(0,0,0,.18);white-space:nowrap;border:none;cursor:pointer;color:#fff;}
.nav-sync:hover{background:rgba(0,0,0,.28);}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;}
.nav-sync.ok .sync-dot{background:#4ADE80;}
.nav-sync.syncing .sync-dot{background:#FCD34D;animation:pulse .8s ease-in-out infinite;}
.nav-sync.error .sync-dot{background:#F87171;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;}

/* ══ MENÚ ☰ ══ */
.menu-dropdown{position:absolute;top:52px;right:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);min-width:220px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:300;overflow:hidden;}
.menu-note{font-size:10px;color:var(--text3);line-height:1.5;padding:8px 14px 6px;border-bottom:1px solid var(--border);font-style:italic;}
.menu-section{padding:4px 0 2px;border-bottom:1px solid var(--border);}
.menu-section:last-child{border-bottom:none;}
.menu-section-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 14px 2px;}
.menu-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .1s;}
.menu-item:hover{background:var(--surface2);color:var(--text);}
.menu-item.danger{color:var(--red);}
.menu-item.danger:hover{background:var(--red-l);}
.menu-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.menu-item.active-view{background:var(--accent-l);color:var(--accent);font-weight:600;}
.menu-item.active-view:hover{background:var(--accent-l);}
.view-check{margin-left:auto;font-size:11px;color:var(--accent);}

/* ══ FILTROS (sidebar) ══ */
#panel-filters{width:230px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:10px 0 4px;}
.fblock{padding:5px 12px 7px;border-bottom:1px solid var(--border);}
.fblock-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;padding:4px 0 3px;}
.fopt{display:flex;align-items:center;padding:5px 8px;border-radius:var(--r-sm);cursor:pointer;font-size:12px;color:var(--text2);user-select:none;transition:background .1s;gap:6px;}
.fopt:hover{background:var(--surface2);}
.fopt.active{background:var(--accent-l);color:var(--accent);font-weight:600;}
.fopt input{accent-color:var(--accent);}
.fopt-label{flex:1;}
.fcnt{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--surface2);color:var(--text3);font-weight:600;flex-shrink:0;}
.fopt.active .fcnt{background:var(--accent);color:#fff;}
.clear-btn{margin:8px 12px 4px;width:calc(100% - 24px);padding:6px;border-radius:var(--r-sm);background:var(--red-l);color:var(--red);font-size:11px;font-weight:600;font-family:var(--font);border:none;cursor:pointer;}
.clear-btn:hover{background:#edadaa;}

/* ══ TARJETAS ══ */
.cards-scroll{flex:1;overflow-y:auto;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;align-items:stretch;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;display:flex;flex-direction:column;}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.card-title{font-size:15px;font-weight:600;margin-bottom:2px;padding-right:10px;}
.card-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:10px;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.card-tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);display:flex;align-items:center;gap:4px;}
.card-meta{font-size:11px;color:var(--text2);margin-bottom:4px;}
.card-stats{display:flex;gap:14px;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:6px 0 2px;}
.card-stat{flex:1;text-align:center;}
.card-stat .v{font-weight:600;font-size:15px;}
.card-stat .l{font-size:10px;color:var(--text3);text-transform:uppercase;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:10px;border-top:1px solid var(--border);gap:8px;}
.card-actions{display:flex;gap:6px;align-items:center;flex:1;}
.card-btn-sec{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;}
.card-btn-sec:hover{border-color:var(--accent);color:var(--accent);}
.card-btn-prim{height:28px;padding:0 12px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;font-size:11px;font-family:var(--font);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;}
.card-btn-prim:hover{background:var(--red);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}

/* ══ BADGES ══ */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;}
.badge.b-presupuesto{background:var(--amber-l);color:var(--amber);}
.badge.b-ejecucion{background:var(--blue-l);color:var(--blue);}
.badge.b-finalizada{background:var(--green-l);color:var(--green);}

/* ══ TABLA (vista tabla) ══ */
.table-view{flex:1;overflow:auto;}
.data-table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.data-table th,.data-table td{padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.data-table th{background:var(--surface2);font-weight:700;color:var(--text3);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;z-index:1;}
.data-table tbody tr:hover td{background:#fafaf8;}
.dt-th{position:relative;cursor:pointer;user-select:none;padding-right:22px !important;}
.dt-th:hover{background:#e8e4dc;}
.dt-th .sort-icon{font-size:10px;color:var(--text3);margin-left:4px;}
.dt-th.sort-asc,.dt-th.sort-desc{background:var(--accent-l) !important;color:var(--accent);}
.dt-th.sort-asc .sort-icon,.dt-th.sort-desc .sort-icon{color:var(--accent);}
.col-resize{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:col-resize;background:transparent;border-right:2px solid var(--border);}
.col-resize:hover,.col-resize.resizing{border-right-color:var(--accent);}
.sub-mono{font-family:var(--mono);color:var(--text3);font-size:11px;}

/* ══ MODAL / WIZARD ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal{background:var(--surface);border-radius:var(--r-lg);width:720px;max-width:92vw;max-height:calc(100vh - 48px);display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(0,0,0,.22);}
.modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15.5px;font-weight:600;}
.modal-close{width:28px;height:28px;border:none;background:var(--surface2);border-radius:var(--r-sm);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.wiz-steps{display:flex;gap:0;padding:14px 20px 0;flex-shrink:0;}
.wiz-step{flex:1;text-align:center;font-size:11.5px;color:var(--text3);padding-bottom:10px;border-bottom:3px solid var(--border);font-weight:500;}
.wiz-step.active{color:var(--accent);border-color:var(--accent);}
.wiz-step.done{color:var(--green);border-color:var(--green-l);}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;}
.wiz-group-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;margin:2px 0 -6px;}
.field{margin-bottom:0;}
.field label,.field-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.field input,.field select,.field textarea,.field-input{width:100%;border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;}
.field input:focus,.field select:focus,.field textarea:focus,.field-input:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:flex;gap:12px;}
.field-row>.field{flex:1;}
.chk-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:2px;}
.modal-footer{padding:12px 20px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:8px;}
.btn{height:36px;padding:0 16px;border-radius:var(--r-sm);font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:#fff;font-weight:600;border:none;flex:1;justify-content:center;}
.btn-primary:hover{background:var(--red);}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

/* Wizard: tabs de torre, chips, atributos */
.tabs-torre{display:flex;gap:6px;flex-wrap:wrap;}
.tab-torre{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12.5px;background:#fff;}
.tab-torre.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.piso-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.piso-label{font-family:var(--mono);font-size:12.5px;width:32px;flex-shrink:0;padding-top:5px;}
.piso-cant{width:60px;flex-shrink:0;}
.chip-scroll{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.chip{font-family:var(--mono);font-size:11.5px;padding:4px 0;border-radius:5px;background:var(--accent-l);color:var(--accent);flex-shrink:0;border:none;width:46px;text-align:center;box-sizing:border-box;}
.chip.excl{background:var(--surface2);color:var(--text3);text-decoration:line-through;}
.dept-total{text-align:right;font-size:12.5px;color:var(--text2);margin-top:8px;font-weight:500;}
.attr-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.attr-table th,.attr-table td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;}
.attr-table select,.attr-table input{padding:5px 6px;border:1px solid var(--border);border-radius:4px;width:100%;}
.resumen-box{background:var(--surface2);border-radius:var(--r-sm);padding:12px 14px;font-size:12.5px;}
.resumen-box .rline{display:flex;justify-content:space-between;padding:3px 0;}

/* ══ DETALLE DE OBRA ══ */
#detail-view{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;}
.det-head{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;}
.det-back{background:none;border:none;font-size:14px;color:var(--text2);font-weight:500;cursor:pointer;}
.det-back:hover{color:var(--accent);}
.det-title{font-weight:600;font-size:14.5px;}
.det-body{flex:1;display:flex;overflow:hidden;}
.det-sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;flex-shrink:0;}
.det-nav-item{padding:10px 14px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;margin-bottom:2px;color:var(--text2);}
.det-nav-item.active{background:var(--accent-l);color:var(--accent);font-weight:500;}
.det-nav-item.sub{padding-left:26px;font-size:12.5px;}
.det-main{flex:1;overflow-y:auto;padding:24px 30px;}
.det-section h3{font-size:15px;margin:0 0 16px;font-weight:600;}
.info-table{width:100%;border-collapse:collapse;margin-bottom:22px;}
.info-table td{padding:7px 4px;font-size:13px;border-bottom:1px solid var(--border);}
.info-table td:first-child{color:var(--text2);width:180px;}
.estado-btns{display:flex;gap:8px;}
.estado-btns button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12.5px;background:#fff;font-family:var(--font);}
.estado-btns button.on{border-color:transparent;font-weight:600;}
.torre-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;}
.torre-block h4{margin:0 0 8px;font-size:13.5px;font-weight:600;}

/* ══ TOAST ══ */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:var(--text);color:#fff;padding:12px 22px;border-radius:var(--r-sm);font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.toast.success{background:var(--green);}
.toast.warning{background:var(--amber);}
.toast.error{background:var(--red);}
.toast.info{background:var(--blue);}
</style>
</head>

/* ---------------- Utilidades ---------------- */
function uid(){ return 'o'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmtNum(n){ return (n==null||isNaN(n)) ? '—' : Number(n).toLocaleString('es-CL'); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function badgeClass(estado){
  if(estado==='Presupuesto') return 'b-presupuesto';
  if(estado==='En ejecución') return 'b-ejecucion';
  if(estado==='Finalizada') return 'b-finalizada';
  return '';
}
let _toastTimer = null;
function showToast(msg, tipo){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.className = 'toast show' + (tipo ? ' '+tipo : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2600);
}
function diffMeses(d1, d2){
  if(!d1 || !d2) return null;
  const a = new Date(d1), b = new Date(d2);
  if(isNaN(a) || isNaN(b)) return null;
  return Math.round((b - a) / (1000*60*60*24*30.44));
}
function deptosActivosTorre(torre){
  if(!torre.departamentos) return 0;
  let total = 0;
  torre.departamentos.forEach(p => { total += (p.deptos ? p.deptos.length : 0) - (p.excluidos ? p.excluidos.length : 0); });
  return total;
}
function deptosActivosObra(obra){
  return (obra.torres||[]).reduce((s,t) => s + deptosActivosTorre(t), 0);
}
function supTotalObra(obra){
  return (obra.torres||[]).reduce((s,t) => s + (Number(t.superficieTotal)||0), 0) + (Number(obra.superficiePlaca)||0);
}
function supPlacaObra(obra){
  if(obra.plataCompartida) return Number(obra.superficiePlaca)||0;
  return (obra.torres||[]).reduce((s,t) => s + (Number(t.superficiePlacaTorre)||0), 0);
}
function pisosMaxObra(obra){
  return (obra.torres||[]).reduce((m,t) => Math.max(m, Number(t.pisos)||0), 0);
}
function initials(nameOrEmail){
  const base = (nameOrEmail||'').trim();
  if(!base) return '--';
  const parts = base.split(/\s+/);
  if(parts.length >= 2) return (parts[0][0]+parts[1][0]).toUpperCase();
  return base.slice(0,2).toUpperCase();
}

}

document.getElementById('btn-login').addEventListener('click', function(){
  document.getElementById('login-error').textContent = '';
  signInWithPopup(auth, provider).catch(function(e){
    const err = document.getElementById('login-error');
    if(e.code === 'auth/popup-blocked')           err.textContent = 'Activa popups e intenta de nuevo.';
    else if(e.code === 'auth/popup-closed-by-user') err.textContent = 'Cancelaste el inicio de sesión.';
    else if(e.code === 'auth/cancelled-popup-request') err.textContent = '';
    else err.textContent = 'Error: ' + (e.message || 'desconocido');
  });
});

onAuthStateChanged(auth, async function(user) {
  if(user) {
    const email = (user.email || '').toLowerCase();
    try {
      const userSnap = await getDoc(doc(db, 'plataforma_usuarios', email));
      const datos = userSnap.exists() ? userSnap.data() : null;
      const ok = datos && datos.activo !== false && (datos.apps || []).includes(APP_ID);
      if(!ok) {
        const msg = !datos
          ? `Tu cuenta (${email}) no está registrada en la plataforma.`
          : datos.activo === false ? 'Tu cuenta está desactivada.'
          : 'No tienes acceso a esta app. Solicítalo al administrador.';
        await fbSignOut(auth);
        document.getElementById('login-error').textContent = msg;
        return;
      }
      iniciarApp(user);
    } catch(e) {
      console.error('Error verificando acceso:', e.code, e.message);
      document.getElementById('login-error').textContent =
        e.code === 'permission-denied'
          ? 'Error de permisos en base de datos. Contacta al administrador.'
          : 'Error al verificar acceso: ' + e.message;
    }
  } else {
    mostrarLogin();
  }
});

function mostrarLogin(){
  if(_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('app-wrap').style.display = 'none';
  _currentUser = null;
}

function iniciarApp(user){
  _currentUser = user;
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('app-wrap').style.display = 'flex';
  document.getElementById('nav-avatar').textContent = initials(user.displayName || user.email);
  listenObras();
  renderMain();
}

/* ---------------- Firestore sync ---------------- */
function setSyncEstado(estado){
  const btn = document.getElementById('sync-btn');
  const label = document.getElementById('sync-label');
  if(!btn) return;
  btn.className = 'nav-sync ' + estado;
  label.textContent = estado==='ok' ? 'Sincronizado' : estado==='syncing' ? 'Sincronizando…' : 'Error de sync';
}
function listenObras() {
  setSyncEstado('syncing');
  _unsubscribe = onSnapshot(
    query(collection(db, FS_COL), orderBy('modificadoEn', 'desc')),
    (snap) => {
      _obras = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
      setSyncEstado('ok');
      renderMain();
      if(_detail.id) renderDetail();
    },
    (e) => { console.error(e); setSyncEstado('error'); }
  );
}
function guardarObra(datos) {
  setSyncEstado('syncing');
  datos.modificadoEn = new Date().toISOString();
  if(!datos.creadoEn) datos.creadoEn = datos.modificadoEn;
  datos.creadoPor = datos.creadoPor || _currentUser.email;
  return setDoc(doc(db, FS_COL, datos.id), datos).then(()=>setSyncEstado('ok')).catch(()=>setSyncEstado('error'));
}
function eliminarObra(id) {
  setSyncEstado('syncing');
  return deleteDoc(doc(db, FS_COL, id)).then(()=>setSyncEstado('ok')).catch(()=>setSyncEstado('error'));
}

/* ---------------- Render principal (grilla / tabla) ---------------- */
function obrasFiltradas(){
  return _obras.filter(o => {
    if(_filters.segmento.size && !_filters.segmento.has(o.segmento)) return false;
    if(_filters.ciudad.size && !_filters.ciudad.has(o.ciudad)) return false;
    if(_filters.comuna.size && !_filters.comuna.has(o.comuna)) return false;
    return true;
  });
}

function renderMain(){
  const panel = document.getElementById('panel-filters');
  const main = document.getElementById('main-content');
  if(_view === 'table'){
    panel.classList.remove('hidden');
    renderFiltros();
    renderTabla();
  } else {
    panel.classList.add('hidden');
    renderGrilla();
  }
}

function renderFiltros(){
  const panel = document.getElementById('panel-filters');
  const base = _obras;
  const cnt = (arr, key, val) => arr.filter(o => o[key]===val).length;
  const ciudadesUsadas = [...new Set(base.map(o=>o.ciudad).filter(Boolean))];
  const comunasUsadas = [...new Set(base.map(o=>o.comuna).filter(Boolean))];
  panel.innerHTML = `
    <div class="fblock">
      <div class="fblock-title">Segmento</div>
      ${SEGMENTOS.map(s => `
        <label class="fopt ${_filters.segmento.has(s)?'active':''}"><input type="checkbox" data-fg="segmento" value="${esc(s)}" ${_filters.segmento.has(s)?'checked':''}><span class="fopt-label">${esc(s)}</span><span class="fcnt">${cnt(base,'segmento',s)}</span></label>
      `).join('')}
    </div>
    <div class="fblock">
      <div class="fblock-title">Ciudad</div>
      ${ciudadesUsadas.map(c => `
        <label class="fopt ${_filters.ciudad.has(c)?'active':''}"><input type="checkbox" data-fg="ciudad" value="${esc(c)}" ${_filters.ciudad.has(c)?'checked':''}><span class="fopt-label">${esc(c)}</span><span class="fcnt">${cnt(base,'ciudad',c)}</span></label>
      `).join('') || '<div style="color:var(--text3);font-size:12px;padding:4px 8px;">Sin datos</div>'}
    </div>
    <div class="fblock">
      <div class="fblock-title">Comuna</div>
      ${comunasUsadas.map(c => `
        <label class="fopt ${_filters.comuna.has(c)?'active':''}"><input type="checkbox" data-fg="comuna" value="${esc(c)}" ${_filters.comuna.has(c)?'checked':''}><span class="fopt-label">${esc(c)}</span><span class="fcnt">${cnt(base,'comuna',c)}</span></label>
      `).join('') || '<div style="color:var(--text3);font-size:12px;padding:4px 8px;">Sin datos</div>'}
    </div>
    <button class="clear-btn" id="btn-clear-filters">✕ Limpiar filtros</button>
  `;
  panel.querySelectorAll('input[data-fg]').forEach(inp => inp.addEventListener('change', () => {
    const set = _filters[inp.dataset.fg];
    if(inp.checked) set.add(inp.value); else set.delete(inp.value);
    renderMain();
  }));
  document.getElementById('btn-clear-filters').addEventListener('click', () => {
    _filters = { segmento:new Set(), ciudad:new Set(), comuna:new Set() };
    renderMain();
  });
}

/* ---------------- Vista tabla ---------------- */
const TABLE_COLS = [
  {key:'obra', label:'Obra / CG', w:200},
  {key:'torre', label:'Torre', w:90},
  {key:'estado', label:'Estado', w:110},
  {key:'segmento', label:'Segmento', w:100},
  {key:'ciudad', label:'Ciudad', w:110},
  {key:'constructora', label:'Constructora', w:190},
  {key:'pisos', label:'Pisos', w:70},
  {key:'sub', label:'Sub.', w:70},
  {key:'deptos', label:'Deptos', w:80},
  {key:'supTotal', label:'Sup. Total (m²)', w:130},
  {key:'supPlaca', label:'Sup. Placa (m²)', w:130},
  {key:'plazoOferta', label:'Plazo Oferta (m)', w:130},
  {key:'plazoContrato', label:'Plazo Contrato (m)', w:140},
  {key:'plazoRectif', label:'Plazo Rectif. (m)', w:140},
];

function filasTabla(){
  const filas = [];
  obrasFiltradas().forEach(o => {
    const torres = (o.torres && o.torres.length) ? o.torres : [nuevaTorreBase()];
    const plazoContrato = diffMeses(o.inicioCont, o.terminoCont);
    const plazoRectif = diffMeses(o.inicioAcor, o.terminoAcor);
    torres.forEach(t => {
      filas.push({
        obraId: o.id,
        obra: o.nombre, cg: o.codigoCG, torre: t.denominacion || (torres.length>1?'—':''),
        estado: o.estado, segmento: o.segmento, ciudad: o.ciudad, constructora: o.constructora,
        pisos: t.pisos, sub: t.subterraneos, deptos: deptosActivosTorre(t),
        supTotal: Number(t.superficieTotal)||0,
        supPlaca: o.plataCompartida ? (Number(o.superficiePlaca)||0) : (Number(t.superficiePlacaTorre)||0),
        plazoOferta: o.plazoOferta, plazoContrato, plazoRectif
      });
    });
  });
  if(_sort.col){
    filas.sort((a,b) => {
      let va = a[_sort.col], vb = b[_sort.col];
      if(typeof va === 'string' || typeof vb === 'string'){ va = (va||'').toString(); vb = (vb||'').toString(); return va.localeCompare(vb) * _sort.dir; }
      va = va==null?-Infinity:va; vb = vb==null?-Infinity:vb;
      return (va - vb) * _sort.dir;
    });
  }
  return filas;
}

function renderTabla(){
  const main = document.getElementById('main-content');
  const filas = filasTabla();
  if(!filas.length){
    main.innerHTML = `<div class="empty-state">No hay obras que coincidan con los filtros.</div>`;
    return;
  }
  const thHTML = TABLE_COLS.map(c => {
    const w = _colWidths[c.key] || c.w;
    const sortCls = _sort.col===c.key ? (_sort.dir===1 ? 'sort-asc' : 'sort-desc') : '';
    const arrow = _sort.col===c.key ? (_sort.dir===1 ? '↑' : '↓') : '↕';
    return `<th class="dt-th ${sortCls}" style="width:${w}px" data-col="${c.key}">${c.label}<span class="sort-icon">${arrow}</span><span class="col-resize" data-rsz="${c.key}"></span></th>`;
  }).join('');
  const rowsHTML = filas.map(f => `
    <tr data-open="${f.obraId}">
      <td>${esc(f.obra)||'(sin nombre)'}<br><span class="sub-mono">${esc(f.cg)||'—'}</span></td>
      <td>${esc(f.torre)||'—'}</td>
      <td><span class="badge ${badgeClass(f.estado)}">${esc(f.estado)}</span></td>
      <td>${esc(f.segmento)||'—'}</td>
      <td>${esc(f.ciudad)||'—'}</td>
      <td style="white-space:normal">${esc(f.constructora)||'—'}</td>
      <td>${f.pisos ?? '—'}</td>
      <td>${f.sub ?? '—'}</td>
      <td>${f.deptos || '—'}</td>
      <td>${fmtNum(f.supTotal)}</td>
      <td>${fmtNum(f.supPlaca)}</td>
      <td>${f.plazoOferta ?? '—'}</td>
      <td>${f.plazoContrato ?? '—'}</td>
      <td>${f.plazoRectif ?? '—'}</td>
    </tr>`).join('');
  main.innerHTML = `<div class="table-view"><table class="data-table"><thead><tr>${thHTML}</tr></thead><tbody>${rowsHTML}</tbody></table></div>`;

  main.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', (e) => {
    if(e.target.dataset.rsz) return;
    const col = th.dataset.col;
    if(_sort.col === col) _sort.dir *= -1; else { _sort.col = col; _sort.dir = 1; }
    renderTabla();
  }));
  main.querySelectorAll('tr[data-open]').forEach(tr => tr.addEventListener('click', () => abrirDetalle(tr.dataset.open)));
  main.querySelectorAll('.col-resize').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      e.stopPropagation(); e.preventDefault();
      const key = handle.dataset.rsz;
      const th = handle.closest('th');
      handle.classList.add('resizing');
      const startX = e.clientX; const startW = th.offsetWidth;
      function onMove(ev){ const w = Math.max(50, startW + (ev.clientX - startX)); _colWidths[key] = w; th.style.width = w+'px'; }
      function onUp(){ handle.classList.remove('resizing'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });
  });
}

/* ================= WIZARD (crear / editar obra) ================= */
function abrirWizard(id){
  const existente = id ? _obras.find(o => o.id === id) : null;
  _wiz = {
    obra: existente ? JSON.parse(JSON.stringify(existente)) : nuevoObraBase(),
    step: 1, torreActiva: 0, isEdit: !!existente
  };
  if(!_wiz.obra.torres || !_wiz.obra.torres.length) _wiz.obra.torres = [nuevaTorreBase()];
  document.getElementById('wizard-modal').classList.remove('hidden');
  renderWizard();
}
function cerrarWizard(){
  _wiz = null;
  document.getElementById('wizard-modal').classList.add('hidden');
}
function syncTorresConCantidad(){
  const o = _wiz.obra;
  const n = Math.max(1, parseInt(o.cantEdificios)||1);
  while(o.torres.length < n) o.torres.push(nuevaTorreBase());
  while(o.torres.length > n) o.torres.pop();
  if(_wiz.torreActiva >= o.torres.length) _wiz.torreActiva = o.torres.length - 1;
}

function selectHTML(id, opts, val, extraAttr){
  return `<select id="${id}" ${extraAttr||''}>` +
    opts.map(o => `<option value="${esc(o)}" ${o===val?'selected':''}>${esc(o)}</option>`).join('') +
    `</select>`;
}

function renderWizard(){
  const modal = document.getElementById('wizard-modal');
  const o = _wiz.obra;
  const stepsLabels = ['1. Identificación','2. Geometría','3. Departamentos','4. Plazos'];
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-hdr">
        <span class="modal-title">${_wiz.isEdit ? 'Editar obra' : 'Nueva obra'}</span>
        <button class="modal-close" id="wiz-close">✕</button>
      </div>
      <div class="wiz-steps">
        ${stepsLabels.map((l,i) => `<div class="wiz-step ${i+1===_wiz.step?'active':''} ${i+1<_wiz.step?'done':''}">${l}</div>`).join('')}
      </div>
      <div class="modal-body" id="wiz-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="wiz-prev" ${_wiz.step===1?'disabled':''}>← Atrás</button>
        <button class="btn btn-primary" id="wiz-next">${_wiz.step===4 ? 'Guardar obra' : 'Siguiente →'}</button>
      </div>
    </div>`;
  document.getElementById('wiz-close').addEventListener('click', cerrarWizard);
  document.getElementById('wiz-prev').addEventListener('click', () => { _wiz.step--; renderWizard(); });
  document.getElementById('wiz-next').addEventListener('click', wizardSiguiente);
  const body = document.getElementById('wiz-body');
  if(_wiz.step===1) renderWizPaso1(body);
  else if(_wiz.step===2) renderWizPaso2(body);
  else if(_wiz.step===3) renderWizPaso3(body);
  else renderWizPaso4(body);
}

function wizardSiguiente(){
  const o = _wiz.obra;
  if(_wiz.step===1 && !o.nombre.trim()){ showToast('El nombre del proyecto es obligatorio.','warning'); return; }
  if(_wiz.step===2){
    for(const t of o.torres){ if(!t.pisos){ showToast('Todas las torres requieren cantidad de pisos.','warning'); return; } }
  }
  if(_wiz.step < 4){ _wiz.step++; renderWizard(); return; }
  // paso 4 -> guardar
  guardarObra(o).then(() => { cerrarWizard(); _view = _view; _detail.id = null; renderMain(); showToast('Obra guardada','success'); });
}

/* ---- Paso 1: Identificación ---- */
function renderWizPaso1(body){
  const o = _wiz.obra;
  const comunas = COMUNAS_MAP[o.ciudad] || [];
  body.innerHTML = `
    <div class="field"><label>Nombre del proyecto *</label><input id="f-nombre" value="${esc(o.nombre)}"></div>
    <div class="field-row">
      <div class="field"><label>Código CG</label><input id="f-codigoCG" value="${esc(o.codigoCG)}"></div>
      <div class="field"><label>Constructora</label>${selectHTML('f-constructora', CONSTRUCTORAS, o.constructora)}</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Estado</label>${selectHTML('f-estado', ESTADOS, o.estado)}</div>
      <div class="field"><label>Segmento</label>${selectHTML('f-segmento', SEGMENTOS, o.segmento)}</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Ciudad</label>
        <div style="display:flex;gap:6px;">${selectHTML('f-ciudad', ['', ...CIUDADES], o.ciudad)}<button class="btn" id="f-add-ciudad" type="button">+</button></div>
      </div>
      <div class="field"><label>Comuna</label>
        <div style="display:flex;gap:6px;">${selectHTML('f-comuna', ['', ...comunas], o.comuna)}<button class="btn" id="f-add-comuna" type="button">+</button></div>
      </div>
    </div>
    <div class="field"><label>Cantidad de torres/edificios</label><input type="number" min="1" id="f-cantEdificios" value="${o.cantEdificios||1}"></div>
    <div id="placa-compartida-wrap"></div>
    <div class="field"><label>Observaciones</label><textarea id="f-observaciones">${esc(o.observaciones)}</textarea></div>
  `;
  const bind = (id, prop, parse) => document.getElementById(id).addEventListener('input', (e) => { o[prop] = parse ? parse(e.target.value) : e.target.value; if(id==='f-cantEdificios') renderPlacaWrap(); });
  bind('f-nombre','nombre'); bind('f-codigoCG','codigoCG'); bind('f-observaciones','observaciones');
  bind('f-cantEdificios','cantEdificios', v=>parseInt(v)||1);
  document.getElementById('f-constructora').addEventListener('change', e => o.constructora = e.target.value);
  document.getElementById('f-estado').addEventListener('change', e => o.estado = e.target.value);
  document.getElementById('f-segmento').addEventListener('change', e => o.segmento = e.target.value);
  document.getElementById('f-ciudad').addEventListener('change', e => { o.ciudad = e.target.value; o.comuna=''; renderWizPaso1(body); });
  document.getElementById('f-comuna').addEventListener('change', e => o.comuna = e.target.value);
  document.getElementById('f-add-ciudad').addEventListener('click', () => {
    const nueva = prompt('Nombre de la nueva ciudad:'); if(!nueva) return;
    if(!CIUDADES.includes(nueva)){ CIUDADES.push(nueva); COMUNAS_MAP[nueva] = []; }
    o.ciudad = nueva; o.comuna=''; renderWizPaso1(body);
  });
  document.getElementById('f-add-comuna').addEventListener('click', () => {
    if(!o.ciudad){ showToast('Selecciona primero una ciudad.','warning'); return; }
    const nueva = prompt('Nombre de la nueva comuna:'); if(!nueva) return;
    if(!COMUNAS_MAP[o.ciudad].includes(nueva)) COMUNAS_MAP[o.ciudad].push(nueva);
    o.comuna = nueva; renderWizPaso1(body);
  });
  function renderPlacaWrap(){
    const wrap = document.getElementById('placa-compartida-wrap');
    if(o.cantEdificios > 1){
      wrap.innerHTML = `
        <div class="chk-row"><input type="checkbox" id="f-plataCompartida" ${o.plataCompartida?'checked':''}><label for="f-plataCompartida" style="margin:0;">Placa de estacionamiento compartida entre todas las torres</label></div>
        <div id="placa-fields"></div>`;
      document.getElementById('f-plataCompartida').addEventListener('change', e => { o.plataCompartida = e.target.checked; renderPlacaFields(); });
      renderPlacaFields();
    } else { wrap.innerHTML=''; o.plataCompartida=false; }
  }
  function renderPlacaFields(){
    const pf = document.getElementById('placa-fields');
    if(o.plataCompartida){
      pf.innerHTML = `
        <div class="field-row">
          <div class="field"><label>Pisos Placa Estacionamiento</label><input type="number" id="f-pisosPlaca" value="${o.pisosPlacaEstacionamiento??''}"></div>
          <div class="field"><label>Sup. Placa Estacionamiento (m²)</label><input type="number" id="f-supPlaca" value="${o.superficiePlaca??''}"></div>
        </div>`;
      document.getElementById('f-pisosPlaca').addEventListener('input', e => o.pisosPlacaEstacionamiento = parseFloat(e.target.value)||null);
      document.getElementById('f-supPlaca').addEventListener('input', e => o.superficiePlaca = parseFloat(e.target.value)||null);
    } else pf.innerHTML='';
  }
  renderPlacaWrap();
}

/* ---- Paso 2: Geometría por torre ---- */
function renderTabsTorre(container, onSelect){
  const o = _wiz.obra;
  syncTorresConCantidad();
  const tabsHTML = o.torres.map((t,i) => `<div class="tab-torre ${i===_wiz.torreActiva?'active':''}" data-i="${i}">${t.denominacion || 'Torre '+(i+1)}</div>`).join('');
  container.innerHTML = `<div class="tabs-torre">${tabsHTML}</div>`;
  container.querySelectorAll('.tab-torre').forEach(tab => tab.addEventListener('click', () => { _wiz.torreActiva = parseInt(tab.dataset.i); renderTabsTorre(container, onSelect); onSelect(); }));
}
function renderWizPaso2(body){
  const o = _wiz.obra;
  syncTorresConCantidad();
  body.innerHTML = `<div id="tabs-p2"></div><div id="torre-form-p2"></div>`;
  const tabsC = document.getElementById('tabs-p2');
  if(o.torres.length > 1) renderTabsTorre(tabsC, () => renderTorreForm2());
  renderTorreForm2();
  function renderTorreForm2(){
    const t = o.torres[_wiz.torreActiva];
    const showDenom = o.cantEdificios > 1;
    const showPlacaPropia = (o.cantEdificios === 1) || (o.cantEdificios > 1 && !o.plataCompartida);
    const c = document.getElementById('torre-form-p2');
    c.innerHTML = `
      ${showDenom ? `<div class="field"><label>Denominación</label><input id="t-denom" value="${esc(t.denominacion)}" placeholder="Torre A"></div>` : ''}
      <div class="wiz-group-label">Niveles</div>
      <div class="field-row">
        <div class="field"><label>Pisos *</label><input type="number" id="t-pisos" value="${t.pisos??''}"></div>
        <div class="field"><label>Subterráneos</label><input type="number" id="t-subt" value="${t.subterraneos??''}"></div>
        <div class="field"><label>Nivel sala máquinas</label><input type="number" id="t-nivsm" value="${t.nivelSalaMaquinas??''}"></div>
      </div>
      <div class="wiz-group-label">Superficies</div>
      <div class="field-row">
        <div class="field"><label>Sup. Total (m²)</label><input type="number" id="t-supTotal" value="${t.superficieTotal??''}"></div>
        <div class="field"><label>Sup. Piso Tipo (m²)</label><input type="number" id="t-supPT" value="${t.superficiePisoTipo??''}"></div>
        <div class="field"><label>Sup. Subterráneos (m²)</label><input type="number" id="t-supSub" value="${t.superficieSubterraneos??''}"></div>
      </div>
      ${showPlacaPropia ? `
      <div class="wiz-group-label">Estacionamiento</div>
      <div class="field-row">
        <div class="field"><label>Pisos Placa Estacionamiento</label><input type="number" id="t-pisosPlaca" value="${t.pisosPlacaEstacionamiento??''}"></div>
        <div class="field"><label>Sup. Placa Estacionamiento (m²)</label><input type="number" id="t-supPlaca" value="${t.superficiePlacaTorre??''}"></div>
      </div>` : ''}
    `;
    const bindNum = (id, prop) => { const el = document.getElementById(id); if(el) el.addEventListener('input', e => t[prop] = e.target.value===''?null:parseFloat(e.target.value)); };
    if(showDenom) document.getElementById('t-denom').addEventListener('input', e => t.denominacion = e.target.value);
    bindNum('t-pisos','pisos'); bindNum('t-subt','subterraneos'); bindNum('t-nivsm','nivelSalaMaquinas');
    bindNum('t-supTotal','superficieTotal'); bindNum('t-supSub','superficieSubterraneos'); bindNum('t-supPT','superficiePisoTipo');
    bindNum('t-pisosPlaca','pisosPlacaEstacionamiento'); bindNum('t-supPlaca','superficiePlacaTorre');
  }
}

/* ---- Paso 3: Departamentos por torre ---- */
function deptosDePiso(piso, cantidad){
  const arr = [];
  for(let i=1;i<=cantidad;i++) arr.push(String(piso*100+i));
  return arr;
}
function renderWizPaso3(body){
  const o = _wiz.obra;
  syncTorresConCantidad();
  body.innerHTML = `<div id="tabs-p3"></div><div id="torre-form-p3"></div>`;
  const tabsC = document.getElementById('tabs-p3');
  if(o.torres.length > 1) renderTabsTorre(tabsC, () => renderTorreForm3());
  renderTorreForm3();
  function renderTorreForm3(){
    const t = o.torres[_wiz.torreActiva];
    const pisos = Math.max(1, parseInt(t.pisos)||1);
    if(!t.departamentos) t.departamentos = [];
    // asegurar un row por piso 1..pisos
    const map = {};
    t.departamentos.forEach(p => map[p.piso] = p);
    const rows = [];
    for(let p=1;p<=pisos;p++){
      rows.push(map[p] || { piso:p, cantidad: t.cantDeptosTipo||0, deptos: deptosDePiso(p, t.cantDeptosTipo||0), excluidos: [] });
    }
    t.departamentos = rows;
    const c = document.getElementById('torre-form-p3');
    c.innerHTML = `
      <div class="field-row" style="align-items:flex-end;">
        <div class="field"><label>Piso tipo (cantidad)</label><input type="number" id="p3-tipo" value="${t.cantDeptosTipo||0}"></div>
        <div class="field" style="flex:0;"><button class="btn" id="p3-aplicar" type="button" style="white-space:nowrap;">Aplicar a todos →</button></div>
      </div>
      <div id="p3-filas"></div>
      <div class="dept-total" id="p3-total"></div>
    `;
    function renderFilas(){
      const filasC = document.getElementById('p3-filas');
      filasC.innerHTML = t.departamentos.map((row,idx) => `
        <div class="piso-row" data-idx="${idx}">
          <span class="piso-label">P${row.piso}</span>
          <input type="number" min="0" class="piso-cant" value="${row.cantidad}" data-idx="${idx}">
          <div class="chip-scroll">${row.deptos.map(d => `<button type="button" class="chip ${row.excluidos.includes(d)?'excl':''}" data-piso-idx="${idx}" data-dep="${d}">${d}</button>`).join('')}</div>
        </div>
      `).join('');
      let total = 0; t.departamentos.forEach(r => total += r.deptos.length - r.excluidos.length);
      document.getElementById('p3-total').textContent = `Total deptos activos: ${total}`;
      filasC.querySelectorAll('.piso-cant').forEach(inp => inp.addEventListener('input', e => {
        const idx = parseInt(e.target.dataset.idx);
        const row = t.departamentos[idx];
        row.cantidad = parseInt(e.target.value)||0;
        const nuevos = deptosDePiso(row.piso, row.cantidad);
        row.excluidos = row.excluidos.filter(d => nuevos.includes(d));
        row.deptos = nuevos;
        renderFilas();
      }));
      filasC.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => {
        const idx = parseInt(chip.dataset.pisoIdx); const dep = chip.dataset.dep;
        const row = t.departamentos[idx];
        const pos = row.excluidos.indexOf(dep);
        if(pos>=0) row.excluidos.splice(pos,1); else row.excluidos.push(dep);
        renderFilas();
      }));
    }
    renderFilas();
    document.getElementById('p3-tipo').addEventListener('input', e => { t.cantDeptosTipo = parseInt(e.target.value)||0; });
    document.getElementById('p3-aplicar').addEventListener('click', () => {
      t.departamentos.forEach(row => {
        row.cantidad = t.cantDeptosTipo||0;
        row.deptos = deptosDePiso(row.piso, row.cantidad);
        row.excluidos = [];
      });
      renderFilas();
    });
  }
}

/* ---- Paso 4: Plazos + resumen ---- */

  const o = _wiz.obra;
  const pContrato = diffMeses(o.inicioCont, o.terminoCont);
  const pRectif = diffMeses(o.inicioAcor, o.terminoAcor);
  body.innerHTML = `
    <div class="field-row">
      <div class="field"><label>Plazo oferta (meses)</label><input type="number" step="0.5" id="p4-oferta" value="${o.plazoOferta??''}"></div>
      <div class="field"><label>Plazo contrato (calc.)</label><input value="${pContrato??'—'}" disabled></div>
      <div class="field"><label>Plazo rectificado (calc.)</label><input value="${pRectif??'—'}" disabled></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Inicio contrato</label><input type="date" id="p4-inicioCont" value="${o.inicioCont||''}"></div>
      <div class="field"><label>Término contractual</label><input type="date" id="p4-terminoCont" value="${o.terminoCont||''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Inicio acordado</label><input type="date" id="p4-inicioAcor" value="${o.inicioAcor||''}"></div>
      <div class="field"><label>Término acordado</label><input type="date" id="p4-terminoAcor" value="${o.terminoAcor||''}"></div>
    </div>
    <div class="resumen-box">
      <div class="rline"><span>Nombre</span><b>${esc(o.nombre)||'—'}</b></div>
      <div class="rline"><span>CG</span><b>${esc(o.codigoCG)||'—'}</b></div>
      <div class="rline"><span>Ciudad / Comuna</span><b>${esc(o.ciudad)||'—'} / ${esc(o.comuna)||'—'}</b></div>
      <div class="rline"><span>Torres</span><b>${o.torres.length}</b></div>
      <div class="rline"><span>Deptos totales</span><b>${deptosActivosObra(o)}</b></div>
      <div class="rline"><span>Sup. total (m²)</span><b>${fmtNum(supTotalObra(o))}</b></div>
    </div>
  `;
  document.getElementById('p4-oferta').addEventListener('input', e => o.plazoOferta = e.target.value===''?null:parseFloat(e.target.value));
  ['inicioCont','terminoCont','inicioAcor','terminoAcor'].forEach(k => {
    document.getElementById('p4-'+k).addEventListener('input', e => { o[k] = e.target.value; renderWizPaso4(body); });
  });
}

/* ================= DETALLE DE OBRA ================= */
function abrirDetalle(id){
  _detail = { id, section: 'general' };
  document.getElementById('detail-view').classList.remove('hidden');
  renderDetail();
}
function cerrarDetalle(){
  _detail = { id: null, section: 'general' };
  document.getElementById('detail-view').classList.add('hidden');
  renderMain();
}
function obraActual(){ return _obras.find(o => o.id === _detail.id); }

function renderDetail(){
  const dv = document.getElementById('detail-view');
  const o = obraActual();
  if(!o){ cerrarDetalle(); return; }
  const secciones = [
    {id:'general', label:'📋 General'},
    {id:'listado', label:'🏠 Listado', group:'Departamentos'},
    {id:'atributos', label:'📐 Atributos', group:'Departamentos'},
    {id:'plazos', label:'📅 Plazos'},
  ];
  let navHTML = '';
  let lastGroup = null;
  secciones.forEach(s => {
    if(s.group && s.group !== lastGroup){ navHTML += `<div style="font-size:11px;color:var(--text3);text-transform:uppercase;padding:12px 14px 4px;">${s.group}</div>`; lastGroup = s.group; }
    if(!s.group) lastGroup = null;
    navHTML += `<div class="det-nav-item ${s.group?'sub':''} ${_detail.section===s.id?'active':''}" data-sec="${s.id}">${s.label}</div>`;
  });
  dv.innerHTML = `
    <div class="det-head">
      <button class="det-back" id="det-back">← Volver</button>
      <span class="det-title">${esc(o.nombre)||'(sin nombre)'}</span>
      <span class="sub-mono" style="color:var(--text3);">${esc(o.codigoCG)||''}</span>
    </div>
    <div class="det-body">
      <div class="det-sidebar">${navHTML}</div>
      <div class="det-main" id="det-main"></div>
    </div>`;
  document.getElementById('det-back').addEventListener('click', cerrarDetalle);
  dv.querySelectorAll('[data-sec]').forEach(el => el.addEventListener('click', () => { _detail.section = el.dataset.sec; renderDetail(); }));
  const main = document.getElementById('det-main');
  if(_detail.section==='general') renderDetGeneral(main, o);
  else if(_detail.section==='listado') renderDetListado(main, o);
  else if(_detail.section==='atributos') renderDetAtributos(main, o);
  else renderDetPlazos(main, o);
}

function guardarCambioObra(o, cambios){
  Object.assign(o, cambios);
  guardarObra(JSON.parse(JSON.stringify(o)));
}

  main.innerHTML = `<div class="det-section"><h3>Listado de departamentos</h3>` +
    (o.torres||[]).map((t,i) => `
      <div class="torre-block">
        <h4>${esc(t.denominacion) || 'Torre '+(i+1)}</h4>
        ${(t.departamentos||[]).slice().sort((a,b)=>a.piso-b.piso).map(row => `
          <div class="piso-row">
            <span class="piso-label">P${row.piso}</span>
            <div class="chip-scroll">${(row.deptos||[]).map(d => `<span class="chip ${row.excluidos&&row.excluidos.includes(d)?'excl':''}">${d}</span>`).join('') || '<span style="color:var(--text3);font-size:12px;">Sin deptos</span>'}</div>
          </div>`).join('') || '<div style="color:var(--text3);font-size:12.5px;">Sin pisos definidos.</div>'}
      </div>`).join('') + `</div>`;
}

function tipoParts(tipo){
  const m = /^(\d)D\+(\d)B\+(CK|CC)$/.exec(tipo||'');
  return m ? {d:+m[1], b:+m[2], c:m[3]} : {d:'',b:'',c:''};
}
function renderDetAtributos(main, o){
  main.innerHTML = `<div class="det-section"><h3>Atributos — piso tipo</h3>` +
    (o.torres||[]).map((t,ti) => {
      const nums = Object.keys(t.depAtributos||{});
      const filaTipo = (t.departamentos||[]).find(r=>r.piso===1);
      const numsDesdePiso1 = filaTipo ? filaTipo.deptos : [];
      const todos = [...new Set([...nums, ...numsDesdePiso1])].sort((a,b)=>a-b);
      return `
      <div class="torre-block">
        <h4>${esc(t.denominacion) || 'Torre '+(ti+1)}</h4>
        <table class="attr-table">
          <thead><tr><th>N° Depto</th><th>Dormitorios</th><th>Baños</th><th>Cocina</th><th>Sup. (m²)</th></tr></thead>
          <tbody>
            ${todos.map(n => {
              const at = (t.depAtributos||{})[n] || {tipo:'',sup:''};
              const p = tipoParts(at.tipo);
              return `<tr data-torre="${ti}" data-dep="${n}">
                <td class="sub-mono">${n}</td>
                <td><select class="attr-d">${DORM_OPTS.map(v=>`<option value="${v}" ${p.d===v?'selected':''}>${v}D</option>`).join('')}</select></td>
                <td><select class="attr-b">${BANO_OPTS.map(v=>`<option value="${v}" ${p.b===v?'selected':''}>${v}B</option>`).join('')}</select></td>
                <td><select class="attr-c">${COCINA_OPTS.map(v=>`<option value="${v}" ${p.c===v?'selected':''}>${v}</option>`).join('')}</select></td>
                <td><input class="attr-sup" type="number" value="${at.sup??''}"></td>
              </tr>`;
            }).join('') || '<tr><td colspan="5" style="color:var(--text3);">Sin departamentos en piso tipo.</td></tr>'}
          </tbody>
        </table>
        <div class="resumen-box" style="margin-top:10px;" id="resumen-tipo-${ti}"></div>
      </div>`;
    }).join('') + `</div>`;

  main.querySelectorAll('tr[data-torre]').forEach(tr => {
    const commit = () => {
      const ti = parseInt(tr.dataset.torre); const dep = tr.dataset.dep;
      const d = tr.querySelector('.attr-d').value, b = tr.querySelector('.attr-b').value, c = tr.querySelector('.attr-c').value;
      const sup = tr.querySelector('.attr-sup').value;
      const t = o.torres[ti];
      if(!t.depAtributos) t.depAtributos = {};
      t.depAtributos[dep] = { tipo: `${d}D+${b}B+${c}`, sup: sup===''?'':sup };
      guardarCambioObra(o, {});
      renderResumenTipo(ti);
    };
    tr.querySelectorAll('select, input').forEach(el => el.addEventListener('change', commit));
  });
  (o.torres||[]).forEach((t,ti) => renderResumenTipo(ti));
  function renderResumenTipo(ti){
    const box = document.getElementById('resumen-tipo-'+ti);
    if(!box) return;
    const t = o.torres[ti];
    const conteo = {};
    Object.values(t.depAtributos||{}).forEach(a => { if(a.tipo){ conteo[a.tipo] = (conteo[a.tipo]||0)+1; } });
    const totalTorre = deptosActivosTorre(t) || 1;
    box.innerHTML = `<b style="display:block;margin-bottom:6px;">Resumen por tipología</b>` +
      Object.entries(conteo).map(([tipo,n]) => {
        const p = tipoParts(tipo);
        const totalEdificio = n * (totalTorre / (t.cantDeptosTipo||1||1));
        return `<div class="rline"><span>${tipo} (${p.d}D · ${p.b}B · ${p.c})</span><b>${n} / ${Math.round(totalEdificio)||n}</b></div>`;
      }).join('') || '<div style="color:var(--text3);">Sin tipologías asignadas.</div>';
  }
}

function renderDetPlazos(main, o){
  const pContrato = diffMeses(o.inicioCont, o.terminoCont);
  const pRectif = diffMeses(o.inicioAcor, o.terminoAcor);
  main.innerHTML = `
    <div class="det-section">
      <h3>Plazos</h3>
      <div class="field-row">
        <div class="field"><label>Plazo oferta (meses)</label><input type="number" step="0.5" id="dp-oferta" value="${o.plazoOferta??''}"></div>
        <div class="field"><label>Plazo contrato (calc.)</label><input value="${pContrato??'—'}" disabled></div>
        <div class="field"><label>Plazo rectificado (calc.)</label><input value="${pRectif??'—'}" disabled></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Inicio contrato</label><input type="date" id="dp-inicioCont" value="${o.inicioCont||''}"></div>
        <div class="field"><label>Término contractual</label><input type="date" id="dp-terminoCont" value="${o.terminoCont||''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Inicio acordado</label><input type="date" id="dp-inicioAcor" value="${o.inicioAcor||''}"></div>
        <div class="field"><label>Término acordado</label><input type="date" id="dp-terminoAcor" value="${o.terminoAcor||''}"></div>
      </div>
    </div>`;
  document.getElementById('dp-oferta').addEventListener('change', e => guardarCambioObra(o, {plazoOferta: e.target.value===''?null:parseFloat(e.target.value)}));
  ['inicioCont','terminoCont','inicioAcor','terminoAcor'].forEach(k => {
    document.getElementById('dp-'+k).addEventListener('change', e => guardarCambioObra(o, {[k]: e.target.value}));
  });
}

/* ================= EXPORT / IMPORT EXCEL ================= */
const EXCEL_COLS = ['CG','NOMBRE_OBRA','TORRE','CONSTRUCTORA','CIUDAD','COMUNA','ESTADO','SEGMENTO','EDIFICIOS',
  'PISOS','SUBTERRANEOS','DEPARTAMENTOS','DEPTOS_PISO','SUP_TOTAL_M2','SUP_SUB_M2','SUP_PLACA_M2','SUP_PISO_TIPO_M2',
  'PLACA_COMPARTIDA','INICIO_CONTRATO','TERMINO_CONTRACTUAL','INICIO_ACORDADO','TERMINO_ACORDADO',
  'PLAZO_CONTRATO','PLAZO_RECTIFICADO','PLAZO_OFERTA'];

function exportarExcel(){
  const filas = [];
  _obras.forEach(o => {
    const torres = (o.torres&&o.torres.length) ? o.torres : [nuevaTorreBase()];
    const pContrato = diffMeses(o.inicioCont, o.terminoCont);
    const pRectif = diffMeses(o.inicioAcor, o.terminoAcor);
    torres.forEach(t => {
      filas.push({
        CG: o.codigoCG||'', NOMBRE_OBRA: o.nombre||'', TORRE: t.denominacion||'',
        CONSTRUCTORA: o.constructora||'', CIUDAD: o.ciudad||'', COMUNA: o.comuna||'',
        ESTADO: o.estado||'', SEGMENTO: o.segmento||'', EDIFICIOS: o.cantEdificios||1,
        PISOS: t.pisos||'', SUBTERRANEOS: t.subterraneos||'', DEPARTAMENTOS: deptosActivosTorre(t),
        DEPTOS_PISO: t.cantDeptosTipo||'', SUP_TOTAL_M2: t.superficieTotal||'',
        SUP_SUB_M2: t.superficieSubterraneos||'',
        SUP_PLACA_M2: o.plataCompartida ? (o.superficiePlaca||'') : (t.superficiePlacaTorre||''),
        SUP_PISO_TIPO_M2: t.superficiePisoTipo||'', PLACA_COMPARTIDA: o.plataCompartida?'SI':'NO',
        INICIO_CONTRATO: o.inicioCont||'', TERMINO_CONTRACTUAL: o.terminoCont||'',
        INICIO_ACORDADO: o.inicioAcor||'', TERMINO_ACORDADO: o.terminoAcor||'',
        PLAZO_CONTRATO: pContrato??'', PLAZO_RECTIFICADO: pRectif??'', PLAZO_OFERTA: o.plazoOferta??''
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(filas, {header: EXCEL_COLS});
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Obras');
  XLSX.writeFile(wb, `registro-obras-${new Date().toISOString().slice(0,10)}.xlsx`);
}

document.getElementById('file-import-excel').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    importarFilasExcel(rows);
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

function importarFilasExcel(rows){
  const porObra = {};
  rows.forEach(r => {
    const key = (r.CG||'') + '|' + (r.NOMBRE_OBRA||'');
    if(!porObra[key]) porObra[key] = [];
    porObra[key].push(r);
  });
  Object.values(porObra).forEach(filasObra => {
    const r0 = filasObra[0];
    const existente = _obras.find(o => o.codigoCG===r0.CG && o.nombre===r0.NOMBRE_OBRA);
    const o = existente ? JSON.parse(JSON.stringify(existente)) : nuevoObraBase();
    o.codigoCG = r0.CG||''; o.nombre = r0.NOMBRE_OBRA||''; o.constructora = r0.CONSTRUCTORA||CONSTRUCTORAS[0];
    o.ciudad = r0.CIUDAD||''; o.comuna = r0.COMUNA||''; o.estado = r0.ESTADO||ESTADOS[0];
    o.segmento = r0.SEGMENTO||SEGMENTOS[0]; o.cantEdificios = parseInt(r0.EDIFICIOS)||filasObra.length;
    o.plataCompartida = (r0.PLACA_COMPARTIDA==='SI');
    o.inicioCont = r0.INICIO_CONTRATO||''; o.terminoCont = r0.TERMINO_CONTRACTUAL||'';
    o.inicioAcor = r0.INICIO_ACORDADO||''; o.terminoAcor = r0.TERMINO_ACORDADO||'';
    o.plazoOferta = r0.PLAZO_OFERTA===''?null:parseFloat(r0.PLAZO_OFERTA);
    o.torres = filasObra.map((r,i) => {
      const base = (o.torres && o.torres[i]) ? o.torres[i] : nuevaTorreBase();
      return { ...base, denominacion: r.TORRE||'', pisos: parseFloat(r.PISOS)||null,
        subterraneos: parseFloat(r.SUBTERRANEOS)||0, superficieTotal: parseFloat(r.SUP_TOTAL_M2)||null,
        superficieSubterraneos: parseFloat(r.SUP_SUB_M2)||null, superficiePisoTipo: parseFloat(r.SUP_PISO_TIPO_M2)||null,
        superficiePlacaTorre: parseFloat(r.SUP_PLACA_M2)||null, cantDeptosTipo: parseInt(r.DEPTOS_PISO)||0 };
    });
    guardarObra(o);
  });
  showToast('Importación desde Excel completada.','success');
}

/* ================= EXPORT / IMPORT JSON ================= */
function exportarJSON(){
  const blob = new Blob([JSON.stringify(_obras, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `registro-obras-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
document.getElementById('file-import-json').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try {
      const arr = JSON.parse(ev.target.result);
      if(!Array.isArray(arr)) throw new Error('Formato inválido');
      arr.forEach(o => { if(!o.id) o.id = uid(); guardarObra(o); });
      showToast('Importación desde JSON completada.','success');
    } catch(err){ showToast('Error al importar JSON: ' + err.message,'error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

</script>
